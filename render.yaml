# Render Blueprint — auto-discovered at the repo root.
# Push this repo to GitHub, then in Render:
#   New → Blueprint → connect repo → Render finds this file and creates the service.
# Set GROQ_API_KEY and ALLOWED_ORIGINS in the Render dashboard (sync: false below).

services:
  - type: web
    name: rag-chatbot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python ingest.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false              # Set in Render dashboard — never commit.
      - key: CHROMA_DIR
        value: /opt/render/project/src/backend/chroma_db
      - key: CHROMA_COLLECTION
        value: support_kb
      - key: TOP_K
        value: "4"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
      - key: ALLOWED_ORIGINS
        sync: false              # Set to your Netlify URL after frontend deploy.
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: chroma-data
      mountPath: /opt/render/project/src/backend/chroma_db
      sizeGB: 1

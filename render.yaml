# Render Blueprint — auto-discovered at the repo root.
# Free-tier compatible: vector store rebuilds on each cold start (lives in /tmp).
# After Render free tier removed persistent disks, we ingest at app startup
# instead of at build time.

services:
  - type: web
    name: rag-chatbot-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.1-8b-instant
      - key: GROQ_API_KEY
        sync: false              # Set in Render dashboard — never commit.
      - key: CHROMA_DIR
        value: /tmp/chroma_db
      - key: CHROMA_COLLECTION
        value: support_kb
      - key: TOP_K
        value: "4"
      - key: SIMILARITY_THRESHOLD
        value: "0.3"
      - key: ALLOWED_ORIGINS
        sync: false              # Set to your Vercel URL after frontend deploy.
      - key: LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11.9"
